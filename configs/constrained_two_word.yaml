experiment_name: linear_two_word_16bit
seed: 0

experiment:
  mode: constrained_nbit

data:
  task: linear
  task_param_seed: 0
  n_train: 10000
  n_val: 2000
  n_test: 2000
  d_in: 8
  noise_std: 0.0

precision:
  input_bits: 16
  target_bits: 32
  word_bits: 16
  quantize_inputs: true

model:
  name: two_word
  width: 128
  depth: 3

loss:
  name: mse
  lambda_hi: 0.2
  lambda_lo: 0.2

train:
  batch_size: 256
  epochs: 25
  lr: 0.001
  lr_quantized_hidden: 0.0003
  weight_decay: 0.0001
  grad_clip_norm: 1.0

output:
  save_dir: outputs
